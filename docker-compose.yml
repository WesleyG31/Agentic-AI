# Optional infra for the "production" profile. The core demo runs WITHOUT this
# (local Chroma + SQLite checkpointer). Bring this up to exercise the durable
# Postgres checkpointer, Qdrant vector store, and Langfuse observability.
#
#   docker compose up -d
#
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kompass
      POSTGRES_PASSWORD: kompass
      POSTGRES_DB: kompass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kompass"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  # Langfuse (self-hosted tracing). Uses its own Postgres for isolation.
  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pgdata:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:latest
    depends_on:
      - langfuse-db
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: dev-secret-change-me
      SALT: dev-salt-change-me
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"

volumes:
  pgdata:
  qdrant_storage:
  langfuse_pgdata:
