name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:  # evals run on-demand (they call the OpenAI API and cost money)

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q

  # Runs the eval suite on a fixed golden set and fails if the score
  # regresses below the committed threshold. Produces the README badge.
  evals:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: ${{ github.event_name == 'workflow_dispatch' }}  # manual — needs OPENAI_API_KEY secret
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -r requirements-dev.txt
      - name: Seed corpus
        run: python -m kompass.scripts.seed
      - name: Run evals (regression gate)
        run: python -m evals.run --ci --min-score 0.75
